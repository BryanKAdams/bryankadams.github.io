<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        #hero {
            width: 80px;
            height: 80px;
            position: absolute;
        }

        #background {
            width: 3600px;
            height: 500px;
            position: absolute top: 0px left: 0px;
        }

        #background img {
            height: 100%;
            width: 100%;
        }

        #hero img {
            width: 100%;
            
        }

        #arrows {
            display: flex;        }

        #arrows img {
            max-width: 40px;
            position: fixed;
        }
        #arrows div img:hover {
            color: red;
        }

        #arrows div {
            display: flex;
            justify-content: center;
            flex-direction: row;
            width: 100%
        }

        #arrows div:nth-child(1) img {
            transform: rotate(270deg);

        }
        #arrows div:nth-child(1) img:hover{
            color: red;
        }

        #arrows div:nth-child(2) img {
            transform: rotate(90deg);

        }

        #arrows div:nth-child(4) img {
            transform: rotate(180deg);

        }
    </style>
</head>

<body>
    <div id="background"><img src="mapo.png"></div>
    <div id="hero"><img src="link.gif"></div>
    <div id="arrows">
        <div onpointerdown="mouseDown1()" onpointerup="mouseUp1()">
            <img id="left" src="arrows-35-512.png">
        </div>
        <div onpointerdown="mouseDown2()" onpointerup="mouseUp2()">
            <img id="right" src="arrows-35-512.png">
        </div>
        <div onpointerdown="mouseDown3()" onpointerup="mouseUp3()">
            <img id="up" src="arrows-35-512.png">
        </div>
        <div onpointerdown="mouseDown4()" onpointerup="mouseUp4()">
            <img id="down" src="arrows-35-512.png">
        </div>
    </div>
    <script>

        var LEFT_KEY = 37;
        var UP_KEY = 38;
        var RIGHT_KEY = 39;
        var DOWN_KEY = 40;
        var HERO_MOVEMENT = 20;

        var lastLoopRun = 0;


        var hero = new Object();
        hero.element = 'hero';
        hero.x = 250;
        hero.y = 100;
        hero.w = 100;
        hero.h = 175;
        hero.gravity = 0.05;
        hero.gravitySpeed = 0;

        var controller = new Object();

        function toggleKey(keyCode, isPressed) {
            if (keyCode == LEFT_KEY) {
                controller.left = isPressed;
            }
            if (keyCode == RIGHT_KEY) {
                controller.right = isPressed;
            }
            if (keyCode == UP_KEY) {
                controller.up = isPressed;
            }
            if (keyCode == DOWN_KEY) {
                controller.down = isPressed;
            }
        }
        function mouseDown1() {
            document.querySelector("#arrows div:nth-child(1)").style.color = "red";
        }
        function mouseUp1() {
            document.querySelector("#arrows div:nth-child(1)").style.color = "green";
        }
        function mouseDown2() {
            document.querySelector("#arrows div:nth-child(2)").style.color = "red";
        }
        function mouseUp2() {
            document.querySelector("#arrows div:nth-child(2)").style.color = "green";
        }
        function mouseDown3() {
            document.querySelector("#arrows div:nth-child(3)").style.color = "red";
        }
        function mouseUp3() {
            document.querySelector("#arrows div:nth-child(3)").style.color = "green";
        }
        function mouseDown4() {
            document.querySelector("#arrows div:nth-child(4)").style.color = "red";
        }
        function mouseUp4() {
            document.querySelector("#arrows div:nth-child(4)").style.color = "green";
        }
        function setPosition(sprite) {
            var e = document.getElementById(sprite.element);
            e.style.left = sprite.x + 'px';
            e.style.top = sprite.y + 'px';
        }
        function ifInAir() {
            if (hero.y != 255) {
                controller.up = false;
                UP_KEY = null;
                document.querySelector("#arrows div:nth-child(3)").style.color = "green";
            } else {
                UP_KEY = 38;
            }
        }
        this.newPos = function () {
            hero.y += 20 + hero.gravitySpeed;
        }
        function handleControls() {
            if (controller.up || document.querySelector('#arrows div:nth-child(3)').style.color =="red") {
                hero.y -= HERO_MOVEMENT * 6;
            }
            if (controller.down || document.querySelector('#arrows div:nth-child(4)').style.color =="red") {
                hero.y += HERO_MOVEMENT;
            }
            if (controller.left || document.querySelector('#arrows div:nth-child(1)').style.color =="red") {
                hero.x -= HERO_MOVEMENT;
            }
            if (controller.right || document.querySelector('#arrows div:nth-child(2)').style.color =="red") {
                hero.x += HERO_MOVEMENT;
            }
            ensureBounds(hero);
        }
        function ensureBounds(sprite) {
            if (sprite.x < 20) {
                sprite.x = 20;
            }
            if (sprite.y < 20) {
                sprite.y = 20;
            }
            if (sprite.x + sprite.w > 3600) {
                sprite.x = 3600 - sprite.w;
            }
            if (sprite.y + sprite.h > 410) {
                sprite.y = 410 - sprite.h;
            }

        }
        function showSprites() {
            setPosition(hero);
            newPos();
            ifInAir();
        }
        function loop() {
            if (new Date().getTime() - lastLoopRun > 40) {
                handleControls();
                showSprites();

                lastLoopRun = new Date().getTime();
            }
            setTimeout('loop();', 2);
        }
        document.onkeydown = function (evt) {
            toggleKey(evt.keyCode, true);

        }
        document.onkeyup = function (evt) {
            toggleKey(evt.keyCode, false);
        }
        loop();

    </script>
</body>

</html>
